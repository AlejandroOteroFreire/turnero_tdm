version: "3.9"

# ============================================================
# Turnero TDM — Stack completo en Docker
# Solo requiere: Docker Desktop
#
# Uso:
#   docker compose --env-file docker/.env up --build
#
# Servicios expuestos al host:
#   http://localhost:3000   → App Next.js
#   http://localhost:3001   → Worker (webhook WA)
#   http://localhost:54321  → Supabase API (PostgREST + Auth + Realtime)
#   http://localhost:54323  → Supabase Studio (admin de BD)
#   http://localhost:54324  → Inbucket (emails de prueba)
# ============================================================

x-supabase-db-env: &supabase-db-env
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_DB: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

services:

  # ──────────────────────────────────────────────────────
  # PostgreSQL con extensiones de Supabase
  # ──────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.1.0.147
    restart: unless-stopped
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - listen_addresses=*

  # ──────────────────────────────────────────────────────
  # Inicialización de BD (migraciones + seed)
  # Corre una sola vez al levantar por primera vez
  # ──────────────────────────────────────────────────────
  db-init:
    image: supabase/postgres:15.1.0.147
    restart: "no"
    environment:
      <<: *supabase-db-env
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./supabase/seed:/docker-entrypoint-initdb.d/seed:ro
      - ./docker/init-db.sh:/init-db.sh:ro
      - db_init_done:/init-done
    entrypoint: >
      bash -c "
        if [ -f /init-done/completed ]; then
          echo '✅ BD ya inicializada — saltando.';
          exit 0;
        fi;
        bash /init-db.sh &&
        touch /init-done/completed &&
        echo '✅ Inicialización completada.';
      "
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────────────
  # GoTrue — Autenticación (email+pass, Google OAuth)
  # ──────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: ${APP_URL}
      GOTRUE_URI_ALLOW_LIST: "${APP_URL}/*,http://localhost:3000/*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      # Auto-confirmar email en desarrollo
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_MAILER_URLPATHS_INVITE: "{{ .SiteURL }}/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "{{ .SiteURL }}/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "{{ .SiteURL }}/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "{{ .SiteURL }}/auth/v1/verify"
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "false"
      # CORS — permitir requests desde la app
      GOTRUE_CORS_ALLOWED_HEADERS: "*"
      GOTRUE_LOG_LEVEL: debug
      # Google OAuth (dejar vacío para deshabilitar en local)
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "false"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ""
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ""
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "${API_EXTERNAL_URL}/auth/v1/callback"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────
  # PostgREST — API REST autogenerada desde el schema
  # ──────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: "3600"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/3000' 2>/dev/null && echo ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────
  # Supabase Realtime — suscripciones en tiempo real
  # ──────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_SSL: disable
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: insecure-local-secret-key-base-at-least-64-chars-long-xx
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:4000/api/health | grep -q ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────
  # postgres-meta — API de introspección para Studio
  # ──────────────────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.83.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ──────────────────────────────────────────────────────
  # Nginx — API Gateway (reemplaza Kong para simplificar)
  # Enruta /rest/v1, /auth/v1, /realtime/v1, /pg
  # ──────────────────────────────────────────────────────
  kong:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "54321:8000"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started

  # ──────────────────────────────────────────────────────
  # Supabase Studio — interfaz web de administración de BD
  # ──────────────────────────────────────────────────────
  studio:
    image: supabase/studio:20240729-ce42139
    restart: unless-stopped
    ports:
      - "54323:3000"
    depends_on:
      - kong
      - meta
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: "Club Jorge Newbery TDM"
      DEFAULT_PROJECT_NAME: "turnero-tdm-local"
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ""
      LOGFLARE_URL: ""
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/profile"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────
  # Inbucket — servidor SMTP de prueba (emails)
  # UI en http://localhost:54324
  # ──────────────────────────────────────────────────────
  inbucket:
    image: inbucket/inbucket:3.0.4
    restart: unless-stopped
    ports:
      - "54324:9000"   # web UI
      - "2500:2500"    # SMTP
      - "1100:1100"    # POP3
    environment:
      INBUCKET_WEB_ADDR: "0.0.0.0:9000"
      INBUCKET_SMTP_ADDR: "0.0.0.0:2500"
      INBUCKET_POP3_ADDR: "0.0.0.0:1100"

  # ──────────────────────────────────────────────────────
  # Auth Seed — crea usuarios en GoTrue y carga seed data
  # Corre una sola vez después de que auth esté healthy
  # ──────────────────────────────────────────────────────
  auth-seed:
    image: supabase/postgres:15.1.0.147
    restart: "no"
    environment:
      <<: *supabase-db-env
      PGPASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./supabase/seed:/seed:ro
      - ./docker/auth-seed.sh:/auth-seed.sh:ro
      - db_init_done:/init-done
    entrypoint: >
      bash -c "
        if [ -f /init-done/auth-seeded ]; then
          echo '✅ Auth seed ya realizado — saltando.';
          exit 0;
        fi;
        bash /auth-seed.sh &&
        touch /init-done/auth-seeded &&
        echo '✅ Auth seed marcado como completo.';
      "
    depends_on:
      auth:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────────────
  # Redis — estado temporal de lista de espera
  # ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────
  # Worker — WhatsApp Cloud API + Web Push + lista de espera
  # ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: ${REDIS_URL}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID}
      META_WHATSAPP_GROUP_ID: ${META_WHATSAPP_GROUP_ID}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      APP_URL: ${APP_URL}
      WAITLIST_TIMEOUT_MINUTES: ${WAITLIST_TIMEOUT_MINUTES}
    volumes:
      - ./worker/src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      kong:
        condition: service_started

  # ──────────────────────────────────────────────────────
  # App — Next.js 14 con hot-reload
  # ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # URL pública (usada por el browser)
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      # URL interna Docker (usada por Server Components y API routes)
      SUPABASE_INTERNAL_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
      WORKER_URL: http://worker:3001
      # Hot-reload en Docker/Windows
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      auth-seed:
        condition: service_completed_successfully
      kong:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  db_data:
  db_init_done:
  redis_data:
  app_node_modules:
  app_next:
