server {
    listen 8000;

    # Resolver DNS interno de Docker
    resolver 127.0.0.11 valid=10s ipv6=off;

    # GoTrue — /auth/v1/* → auth:9999/*
    location /auth/v1/ {
        set $upstream_auth auth:9999;

        # Ocultar headers CORS que GoTrue manda upstream para evitar duplicados
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';

        add_header 'Access-Control-Allow-Origin'   '*' always;
        add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, apikey, x-client-info, x-supabase-api-version' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, X-JSON' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, apikey, x-client-info, x-supabase-api-version';
            add_header 'Access-Control-Max-Age' '86400';
            return 204;
        }

        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass          http://$upstream_auth;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_read_timeout  300;
    }

    # PostgREST — /rest/v1/* → rest:3000/*
    location /rest/v1/ {
        set $upstream_rest rest:3000;

        add_header 'Access-Control-Allow-Origin'   '*' always;
        add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, apikey, x-client-info, Prefer, Accept, Accept-Profile, Content-Profile' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, X-JSON' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, apikey, x-client-info, Prefer, Accept, Accept-Profile, Content-Profile';
            add_header 'Access-Control-Max-Age' '86400';
            return 204;
        }

        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass          http://$upstream_rest;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_headers on;
        proxy_read_timeout  300;
    }

    # Realtime — /realtime/v1/* → realtime:4000/socket/*
    location /realtime/v1/ {
        set $upstream_rt realtime:4000;

        rewrite ^/realtime/v1/(.*)$ /socket/$1 break;
        proxy_pass          http://$upstream_rt;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_pass_request_headers on;
        proxy_read_timeout  3600;
    }

    # postgres-meta — /pg/* → meta:8080/*
    location /pg/ {
        set $upstream_meta meta:8080;

        rewrite ^/pg/(.*)$ /$1 break;
        proxy_pass          http://$upstream_meta;
        proxy_set_header    Host $host;
        proxy_pass_request_headers on;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
